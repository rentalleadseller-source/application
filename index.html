<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Application Form</title>
  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:40px 15px;
}

.container{
width:100%;
max-width:750px;
background:#111827;
padding:40px;
border-radius:12px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:30px;
font-size:28px;
}

.section-title{
margin-top:30px;
margin-bottom:15px;
font-size:18px;
font-weight:600;
color:#60a5fa;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

input:focus{
outline:2px solid #3b82f6;
}

.submit-btn{
width:100%;
margin-top:25px;
padding:14px;
background:#3b82f6;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
color:white;
cursor:pointer;
}

.submit-btn:hover{
background:#2563eb;
}

/* POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111827;
padding:40px;
border-radius:10px;
text-align:center;
max-width:400px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.popup-content h2{
margin-bottom:15px;
}

.close-btn{
margin-top:20px;
padding:10px 20px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Rental Application Form</h1>

<form id="rentalForm">

<div class="section-title">Applicant Information</div>

<div class="form-group">
<label>Full Legal Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Social Security Number</label>
<input type="text" required>
</div>

<div class="section-title">Current Residence</div>

<div class="form-group">
<label>Current Address</label>
<input type="text">
</div>

<div class="form-group">
<label>Current Rent</label>
<input type="text">
</div>

<div class="form-group">
<label>Landlord Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Landlord Phone</label>
<input type="tel">
</div>


<div class="section-title">Employment Information</div>

<div class="form-group">
<label>Employer Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Job Title</label>
<input type="text">
</div>

<div class="form-group">
<label>Monthly Income</label>
<input type="text">
</div>


<div class="section-title">Verification</div>

<div class="form-group">
<label>Applicant Signature</label>
<input type="text">
</div>

<div class="form-group">
<label>Date</label>
<input type="date">
</div>

<button class="submit-btn">Submit Application</button>

</form>

</div>


<div class="popup" id="popup">

<div class="popup-content">

<h2>Application Submitted</h2>

<p id="appNumber"></p>

<p>Contact the Landlord to complete the Application Fee.</p>

<button class="close-btn" onclick="closePopup()">Close</button>

</div>

</div>


<script>

document.getElementById("rentalForm").addEventListener("submit", function(e){

e.preventDefault();

/* generate random 5 digit number */

let appNumber = Math.floor(10000 + Math.random() * 90000);

/* display it */

document.getElementById("appNumber").innerText =
"Application Number: #" + appNumber;

/* show popup */

document.getElementById("popup").style.display="flex";

});

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
